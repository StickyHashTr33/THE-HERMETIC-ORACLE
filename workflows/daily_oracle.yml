name: Daily Oracle Synthesis

on:
  schedule:
    # 4:20 AM CDT = 09:20 UTC (Mar–Nov daylight saving)
    # During CST (Nov–Mar) this will run at 3:20 AM local — see README to adjust
    - cron: '20 9 * * *'
  workflow_dispatch:
    # Allows manual trigger from Actions tab anytime

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit generated HTML back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Oracle Generator
        run: python generate.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and push generated Oracle
        run: |
          git config user.name  "Hermetic Oracle Engine"
          git config user.email "oracle@hermetic.local"
          git add docs/
          git diff --staged --quiet || git commit -m "⊙ Oracle synthesis: $(date -u +'%Y-%m-%d at %H:%M UTC')"
          git push
