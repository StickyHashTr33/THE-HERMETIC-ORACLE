name: Daily Oracle Synthesis

on:
  schedule:
    # 14:00 UTC = 9:00 AM CDT (summer) / 8:00 AM CST (winter).
    # Runs after sunrise year-round so the day ruler is the correct calendar day.
    - cron: '0 14 * * *'
  workflow_dispatch:
    # Allows manual trigger from Actions tab anytime

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit generated HTML back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Oracle Generator
        run: python generate.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BIRTH_DATETIME: '1981-05-17 13:31'
          BIRTH_TZ: 'America/Chicago'

      - name: Commit and push generated Oracle
        run: |
          git config user.name  "Hermetic Oracle Engine"
          git config user.email "oracle@hermetic.local"
          git add docs/
          git diff --staged --quiet || git commit -m "Oracle synthesis: $(date -u +'%Y-%m-%d at %H:%M UTC')"
          git push
